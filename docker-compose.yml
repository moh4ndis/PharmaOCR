services:
  pharma-ocr-api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: pharma-ocr-api:local
    container_name: pharma-ocr-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: ${PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK:-True}
      PADDLEOCR_DET_MODEL: ${PADDLEOCR_DET_MODEL:-PP-OCRv5_mobile_det}
      PADDLEOCR_REC_MODEL: ${PADDLEOCR_REC_MODEL:-en_PP-OCRv5_mobile_rec}
      PADDLEOCR_CPU_THREADS: ${PADDLEOCR_CPU_THREADS:-4}
    volumes:
      - paddleocr-cache:/home/appuser/.paddleocr
      - paddlex-cache:/home/appuser/.paddlex
      - model-cache:/home/appuser/.cache
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  paddleocr-cache:
  paddlex-cache:
  model-cache:
  uploads:
